name: DevBuddy CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || true

      - name: Type Check
        run: npm run typecheck || true

      - name: Dependency Audit
        run: npm audit --audit-level=high || true

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2

      - name: Run Tests
        run: npm test || true

      - name: Block dangerous patterns
        run: |
          if grep -r "rm -rf" .; then
            echo "Dangerous command found!"
            exit 1
          fi
